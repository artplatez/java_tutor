default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host:     <%= ENV.fetch("DB_HOST",     "localhost") %>
  port:     <%= ENV.fetch("DB_PORT",     "5432") %>
  username: <%= ENV.fetch("DB_USERNAME", "postgres") %>
  password: <%= ENV.fetch("DB_PASSWORD", "") %>

development:
  <<: *default
  database: java_tutor_development

test:
  <<: *default
  database: java_tutor_test

production:
  <<: *default
  database: java_tutor_production
  username: java_tutor
  password: <%= ENV["JAVA_TUTOR_DATABASE_PASSWORD"] %>
